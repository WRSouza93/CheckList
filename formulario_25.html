        function createAccordionSection(sectionData, prefix, parentId) {
            return sectionData.map((section, index) => {
                const sectionId = `${prefix}_section_${index}`;
                const itemsHtml = section.items.map(item => 
                    createChecklistItem(item.num, item.desc, `${prefix}_${index}`, item.hasMeasurement || false)
                ).join('');
                
                return `
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#${sectionId}">
                                ${section.title}
                            </button>
                        </h2>
                        <div id="${sectionId}" class="accordion-collapse collapse" data-bs-parent="#${parentId}">
                            <div class="accordion-body">
                                ${itemsHtml}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Função de exportação
function exportData() {
    const nsValue = document.getElementById('ns').value || 'sem_ns';
    const data = {
        informacoes: {
            cliente: document.getElementById('cliente').value,
            op: document.getElementById('op').value,
            ns: nsValue,
            modelo: document.getElementById('modelo').value,
            data: document.getElementById('data').value,
            producao: document.getElementById('producao').value,
            responsavel: document.getElementById('responsavel').value
        },
        checklists: []
    };

    document.querySelectorAll('.checklist-item').forEach(item => {
        const itemId = item.getAttribute('data-item-id');
        const radioChecked = item.querySelector(`input[name="${itemId}"]:checked`);
        const responsible = document.getElementById(`${itemId}_resp`)?.value;
        const incidenciaText = document.getElementById(`${itemId}_incidencia_text`)?.value;
        
        // Campos de medição
        const valorIdeal = document.getElementById(`${itemId}_valor_ideal`)?.value;
        const valorMedido = document.getElementById(`${itemId}_valor_medido`)?.value;
        const equipamento = document.getElementById(`${itemId}_equipamento`)?.value;

        if (radioChecked || responsible || incidenciaText || valorIdeal || valorMedido || equipamento) {
            const itemData = {
                item: itemId,
                status: radioChecked?.value || null,
                responsavel: responsible || null,
                incidencia: incidenciaText || null
            };
            
            // Adicionar dados de medição se existirem
            if (valorIdeal || valorMedido || equipamento) {
                itemData.medicao = {
                    valorIdeal: valorIdeal || null,
                    valorMedido: valorMedido || null,
                    equipamento: equipamento || null
                };
            }
            
            data.checklists.push(itemData);
        }
    });

    const dataStr = JSON.stringify(data, null, 2);
    const fileName = `inspecao_${nsValue}_${new Date().toISOString().split('T')[0]}.json`;
    
    // Criar um blob e forçar o download com o diálogo "Salvar como"
    const dataBlob = new Blob([dataStr], {type: 'application/json'});
    
    // Usar a File System Access API se disponível (Chrome, Edge moderno)
    if ('showSaveFilePicker' in window) {
        // API moderna - permite escolher local
        const opts = {
            suggestedName: fileName,
            types: [{
                description: 'Arquivo JSON',
                accept: {'application/json': ['.json']},
            }],
        };
        
        window.showSaveFilePicker(opts).then(fileHandle => {
            return fileHandle.createWritable();
        }).then(writable => {
            writable.write(dataBlob);
            writable.close();
            alert('Dados exportados com sucesso!');
        }).catch(err => {
            // Se o usuário cancelar, não mostra erro
            if (err.name !== 'AbortError') {
                console.error('Erro ao salvar:', err);
            }
        });
    } else {
        // Fallback para navegadores mais antigos - usa o método tradicional
        const url = URL.createObjectURL(dataBlob);
        const link = document.createElement('a');
        link.href = url;
        link.download = fileName;
        
        // Adicionar ao DOM temporariamente para funcionar no Firefox
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        // Limpar o URL após um delay
        setTimeout(() => {
            URL.revokeObjectURL(url);
        }, 100);
        
        alert('Dados exportados com sucesso!');
    }
}


        // Função de importação
        function importData() {
            const fileInput = document.getElementById('fileInput');
            fileInput.click();
            
            fileInput.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const data = JSON.parse(event.target.result);
                        
                        if (data.informacoes) {
                            document.getElementById('cliente').value = data.informacoes.cliente || '';
                            document.getElementById('op').value = data.informacoes.op || '';
                            document.getElementById('ns').value = data.informacoes.ns || '';
                            document.getElementById('modelo').value = data.informacoes.modelo || '';
                            document.getElementById('data').value = data.informacoes.data || '';
                            document.getElementById('producao').value = data.informacoes.producao || '';
                            document.getElementById('responsavel').value = data.informacoes.responsavel || '';
                        }

                        if (data.checklists && Array.isArray(data.checklists)) {
                            data.checklists.forEach(item => {
                                if (item.status) {
                                    const radio = document.getElementById(`${item.item}_${item.status.toLowerCase()}`);
                                    if (radio) {
                                        radio.checked = true;
                                        handleCheckboxChange(item.item, item.status);
                                    }
                                }

                                if (item.responsavel) {
                                    const select = $(`#${item.item}_resp`);
                                    if (select.length) {
                                        select.val(item.responsavel).trigger('change');
                                    }
                                }

                                if (item.incidencia) {
                                    const textarea = document.getElementById(`${item.item}_incidencia_text`);
                                    if (textarea) {
                                        textarea.value = item.incidencia;
                                    }
                                }
                                
                                // Carregar dados de medição
                                if (item.medicao) {
                                    const valorIdealInput = document.getElementById(`${item.item}_valor_ideal`);
                                    const valorMedidoInput = document.getElementById(`${item.item}_valor_medido`);
                                    const equipamentoInput = document.getElementById(`${item.item}_equipamento`);
                                    
                                    if (valorIdealInput) valorIdealInput.value = item.medicao.valorIdeal || '';
                                    if (valorMedidoInput) valorMedidoInput.value = item.medicao.valorMedido || '';
                                    if (equipamentoInput) equipamentoInput.value = item.medicao.equipamento || '';
                                }
                            });
                        }

                        saveToLocalStorage();
                        alert('Dados importados com sucesso!');
                    } catch (error) {
                        alert('Erro ao importar arquivo: ' + error.message);
                    }
                };
                reader.readAsText(file);
                fileInput.value = '';
            };
        }

        // Função para limpar dados
        function clearData() {
            if (confirm('Tem certeza que deseja limpar todos os dados? Esta ação não pode ser desfeita.')) {
                document.getElementById('cliente').value = '';

                document.getElementById('responsavel').value = '';

                document.querySelectorAll('input[type="radio"]').forEach(radio => {
                    radio.checked = false;
                });

                $('.select2-employee').val(null).trigger('change');

                document.querySelectorAll('.incidencia-box').forEach(box => {
                    box.classList.remove('show');
                });
                
                document.querySelectorAll('textarea[id$="_incidencia_text"]').forEach(textarea => {
                    textarea.value = '';
                });
                
                // Limpar campos de medição
                document.querySelectorAll('input[id$="_valor_ideal"], input[id$="_valor_medido"], input[id$="_equipamento"]').forEach(input => {
                    input.value = '';
                });

                localStorage.clear();
                alert('Todos os dados foram limpos!');
            }
        }

        // Salvar automaticamente no localStorage
        function saveToLocalStorage() {
            const allInputs = document.querySelectorAll('input, textarea, select');
            allInputs.forEach(input => {
                if (input.type === 'radio' && input.checked) {
                    localStorage.setItem(input.name, input.value);
                } else if (input.type !== 'radio') {
                    localStorage.setItem(input.id, input.value);
                }
            });
        }

        // Carregar dados salvos
        function loadSavedData() {
            const allInputs = document.querySelectorAll('input, textarea, select');
            allInputs.forEach(input => {
                const savedValue = localStorage.getItem(input.id);
                if (savedValue) {
                    if (input.type === 'radio') {
                        const savedRadio = localStorage.getItem(input.name);
                        if (input.value === savedRadio) {
                            input.checked = true;
                            handleCheckboxChange(input.name, input.value);
                        }
                    } else if (input.tagName === 'SELECT') {
                        $(input).val(savedValue).trigger('change');
                    } else {
                        input.value = savedValue;
                    }
                }
            });
        }

        // Auto-save para inputs
        function setupAutoSave() {
            const allInputs = document.querySelectorAll('input[type="text"], input[type="date"], textarea');
            allInputs.forEach(input => {
                input.addEventListener('change', saveToLocalStorage);
                input.addEventListener('blur', saveToLocalStorage);
            });
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            setupAutoSave();
            setTimeout(() => {
                loadSavedData();
            }, 500);
        });

    async function exportPDF() {
    try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({
            orientation: 'portrait',
            unit: 'mm',
            format: 'a4'
        });

        const pageHeight = doc.internal.pageSize.getHeight();
        const pageWidth = doc.internal.pageSize.getWidth();
        let yPosition = 15;
        const margin = 10;
        const lineHeight = 5;

        // Header
        doc.setFontSize(16);
        doc.setTextColor(8, 45, 69);
        doc.text('VARPE BRASIL', margin, yPosition);
        yPosition += 8;
        
        doc.setFontSize(10);
        doc.setTextColor(100, 100, 100);
        doc.text('INFORME DE INSPEÇÃO FINAL PARA CONTROLADORAS (V2000/CPA-50)', margin, yPosition);
        yPosition += 10;

        // Informações do Formulário
        doc.setFontSize(11);
        doc.setTextColor(8, 45, 69);
        doc.text('INFORMAÇÕES GERAIS', margin, yPosition);
        yPosition += 6;

        doc.setFontSize(9);
        doc.setTextColor(0, 0, 0);
        const infos = [
            `Cliente: ${document.getElementById('cliente').value || 'N/A'}`,
            `OP: ${document.getElementById('op').value || 'N/A'}`,
            `N/S: ${document.getElementById('ns').value || 'N/A'}`,
            `Modelo: ${document.getElementById('modelo').value || 'N/A'}`,
            `Data: ${document.getElementById('data').value || 'N/A'}`,
            `Produção: ${document.getElementById('producao').value || 'N/A'}`,
            `Responsável: ${document.getElementById('responsavel').value || 'N/A'}`
        ];

        infos.forEach(info => {
            if (yPosition + 5 > pageHeight - 10) {
                doc.addPage();
                yPosition = 15;
            }
            doc.text(info, margin + 5, yPosition);
            yPosition += 5;
        });

        yPosition += 5;

        // Seções de Checklist
        const sections = ['basico', 'banda', 'detector', 'policarbonato', 'ip66', 'rampa'];
        const sectionTitles = {
            basico: 'BÁSICO',
            banda: 'BANDA LATERAL',
            detector: 'DETECTOR METAL',
            policarbonato: 'PROTEÇÕES POLICARBONATO',
            ip66: 'IP-66',
            rampa: 'RAMPA'
        };

        sections.forEach(section => {
            if (yPosition + 10 > pageHeight - 10) {
                doc.addPage();
                yPosition = 15;
            }

            // Título da seção
            doc.setFontSize(12);
            doc.setTextColor(8, 45, 69);
            doc.text(sectionTitles[section], margin, yPosition);
            yPosition += 8;

            // Itens de checklist
            document.querySelectorAll(`[data-item-id^="${section}_"]`).forEach(item => {
                if (yPosition + 8 > pageHeight - 10) {
                    doc.addPage();
                    yPosition = 15;
                }

                const itemId = item.getAttribute('data-item-id');
                const radioChecked = item.querySelector(`input[name="${itemId}"]:checked`);
                const responsible = document.getElementById(`${itemId}_resp`)?.value || 'N/A';
                const status = radioChecked?.value || 'N/A';
                const incidencia = document.getElementById(`${itemId}_incidencia_text`)?.value;

                const valorIdeal = document.getElementById(`${itemId}_valor_ideal`)?.value;
                const valorMedido = document.getElementById(`${itemId}_valor_medido`)?.value;
                const equipamento = document.getElementById(`${itemId}_equipamento`)?.value;

                // Número e status
                doc.setFontSize(9);
                doc.setTextColor(0, 0, 0);
                
                let statusColor = [0, 0, 0];
                if (status === 'OK') statusColor = [40, 167, 69];
                else if (status === 'NOK') statusColor = [220, 53, 69];
                else if (status === 'NA') statusColor = [108, 117, 125];

                doc.setTextColor(...statusColor);
                doc.text(`[${status}]`, margin + 5, yPosition);
                
                doc.setTextColor(0, 0, 0);
                doc.text(`${responsible}`, margin + 25, yPosition);

                yPosition += 4;

                if (incidencia) {
                    doc.setTextColor(220, 53, 69);
                    doc.setFontSize(8);
                    const wrappedText = doc.splitTextToSize(`Incidência: ${incidencia}`, pageWidth - margin * 2 - 10);
                    doc.text(wrappedText, margin + 10, yPosition);
                    yPosition += wrappedText.length * 3;
                }

                if (valorIdeal || valorMedido || equipamento) {
                    doc.setTextColor(0, 100, 200);
                    doc.setFontSize(8);
                    const medicaoText = `Ideal: ${valorIdeal || 'N/A'} | Medido: ${valorMedido || 'N/A'} | Equip: ${equipamento || 'N/A'}`;
                    doc.text(medicaoText, margin + 10, yPosition);
                    yPosition += 4;
                }

                yPosition += 3;
            });

            yPosition += 5;
        });

        // Salvar
        const nsValue = document.getElementById('ns').value || 'sem_ns';
        const fileName = `inspecao_${nsValue}_${new Date().toISOString().split('T')[0]}.pdf`;
        doc.save(fileName);
        alert('PDF exportado com sucesso!');

    } catch (error) {
        console.error('Erro ao gerar PDF:', error);
        alert('Erro ao gerar PDF: ' + error.message);
    }
}

    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
