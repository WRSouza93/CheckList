<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Form 25 VARPE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background:#f4f6f9; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }
    .login-card { width:100%; max-width:420px; border-radius:14px; box-shadow:0 8px 32px rgba(8,45,69,.13); border:none; }
    .login-header { background:linear-gradient(135deg,#082d45,#1a4a6e); border-radius:14px 14px 0 0; padding:2rem; text-align:center; }
    .btn-login { background:#082d45; border:none; border-radius:8px; padding:.7rem; font-weight:600; }
    .btn-login:hover { background:#1a4a6e; }
  </style>
</head>
<body>
<div class="card login-card">
  <div class="login-header">
    <div style="font-size:2.5rem;color:#fff"><i class="bi bi-clipboard2-check-fill"></i></div>
    <h4 class="text-white fw-bold mb-0">Form 25</h4>
    <p class="text-white-50 small mb-0">Inspeção Final — VARPE</p>
  </div>
  <div class="card-body p-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post" action="{{ url_for('login') }}">
      <input type="hidden" name="next" value="{{ request.args.get('next','') }}">
      <div class="mb-3">
        <label class="form-label fw-semibold">Funcionário</label>
        <select name="nome" class="form-select" required autofocus>
          <option value="">— Selecione —</option>
          {% for f in funcionarios %}
            <option value="{{ f.nome }}">{{ f.nome }}{% if f.is_admin %} ★{% endif %}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Senha</label>
        <div class="input-group">
          <input type="password" name="senha" id="senhaInput" class="form-control" placeholder="••••••" required>
          <button type="button" class="btn btn-outline-secondary" onclick="toggleSenha()">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-login btn-primary w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
      </button>
    </form>
  </div>
</div>
<script>
function toggleSenha(){
  const i=document.getElementById('senhaInput'),ic=document.getElementById('eyeIcon');
  if(i.type==='password'){i.type='text';ic.className='bi bi-eye-slash';}
  else{i.type='password';ic.className='bi bi-eye';}
}
</script>
</body>
</html>
